<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Danh mục - Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<div class="main-content">
    <div class="page-header"><h2><i class="bi bi-grid"></i> <span th:text="${danhMuc.id != null} ? 'Sửa Danh mục' : 'Thêm Danh mục'"></span></h2></div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/danhmuc/save}" method="post" th:object="${danhMuc}">
                <input type="hidden" th:field="*{id}"/>
                <div class="row g-3">
                    <div class="col-md-4"><label class="form-label">Tên viết tắt *</label><input type="text" class="form-control" th:field="*{tenVietTat}" required/></div>
                    <div class="col-md-8"><label class="form-label">Tên đầy đủ *</label><input type="text" class="form-control" th:field="*{tenDayDu}" required/></div>
                    <div class="col-md-6"><label class="form-label">Link ảnh</label><input type="text" class="form-control" th:field="*{linkAnh}"/></div>
                    <div class="col-md-6"><label class="form-label">Link truy cập</label><input type="text" class="form-control" th:field="*{linkTruyCap}"/></div>
                    <div class="col-md-4"><label class="form-label">Người quản lý</label><input type="text" class="form-control" th:field="*{nguoiQuanLy}"/></div>
                    <div class="col-md-4"><label class="form-label">Danh mục cha</label><input type="number" class="form-control" th:field="*{danhMucCha}" value="0"/></div>
                    <div class="col-md-4"><div class="form-check mt-4"><input type="checkbox" class="form-check-input" th:field="*{dangDung}"/><label class="form-check-label">Đang sử dụng</label></div></div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu</button>
                    <a href="/admin/danhmuc" class="btn btn-secondary ms-2">Huỷ</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
